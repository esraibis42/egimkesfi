<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğim Keşfi - Matematik Projesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 2px solid #3498db;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        input {
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            width: 100px;
            font-size: 16px;
        }

        #canvas-container {
            margin: 30px auto;
            position: relative;
            width: 400px;
            height: 300px;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px), linear-gradient(90deg, #e1e1e1 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #ccc;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        #slope-result {
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            margin: 20px;
        }

        .feedback {
            font-style: italic;
            color: #7f8c8d;
            height: 30px;
        }

        .bike {
            font-size: 30px;
            transition: all 0.5s ease;
            position: absolute;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📐 Eğim Keşfi Dünyası</h1>
        <p>Dikey ve yatay uzunlukları gir, eğimin nasıl değiştiğini izle!</p>

        <div class="input-group">
            <div>
                <label>Dikey (y): </label><br>
                <input type="number" id="v-input" value="100" oninput="draw()">
            </div>
            <div>
                <label>Yatay (x): </label><br>
                <input type="number" id="h-input" value="200" oninput="draw()">
            </div>
        </div>

        <div id="slope-result">Eğim: 0.50</div>
        <div id="feedback-text" class="feedback">Güzel bir rampa! 🚲</div>

        <div id="canvas-container">
            <svg id="svg-area">
                <polygon id="triangle" points="50,250 250,250 250,150" fill="rgba(52, 152, 219, 0.3)" stroke="#3498db"
                    stroke-width="3" />
                <text id="bike-emoji" x="130" y="190" class="bike">🚲</text>
            </svg>
        </div>

        <p style="font-size: 0.8em; color: #95a5a6;">Matematik Öğretmeni Esra İbiş tarafından geliştirilmiştir.</p>
    </div>

    <script>
        function draw() {
            const v = parseFloat(document.getElementById('v-input').value) || 0;
            const h = parseFloat(document.getElementById('h-input').value) || 0;
            const slope = v / h;

            // Üçgeni güncelle (Başlangıç noktası 50,250)
            const xBase = 50;
            const yBase = 250;
            const newX = xBase + h;
            const newY = yBase - v;

            document.getElementById('triangle').setAttribute('points', `${xBase},${yBase} ${newX},${yBase} ${newX},${newY}`);

            // Eğim sonucunu yaz
            document.getElementById('slope-result').innerText = "Eğim (m): " + slope.toFixed(2);

            // Bisikletliyi hipotenüsün ortasına koy ve eğ
            const bike = document.getElementById('bike-emoji');
            bike.setAttribute('x', (xBase + newX) / 2 - 15);
            bike.setAttribute('y', (yBase + newY) / 2 - 5);
            const angle = Math.atan(slope) * (-180 / Math.PI);
            bike.setAttribute('transform', `rotate(${angle}, ${(xBase + newX) / 2}, ${(yBase + newY) / 2})`);

            // Geri bildirim
            let msg = "";
            if (slope < 0.2) msg = "Hafif yokuş, bisikletle rahat gidilir! 🚲";
            else if (slope < 0.6) msg = "Biraz dikleşti, vites küçült! 🚵‍♀️";
            else msg = "Çok dik! Tam bir tırmanış! 🧗‍♀️";
            document.getElementById('feedback-text').innerText = msg;
        }
        window.onload = draw;
    </script>
</body>

</html>
