<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğim Master v3.0 | Final Sürümü</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sol Panel */
        .sidebar {
            width: 400px;
            background: rgba(30, 41, 59, 0.98);
            padding: 20px;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .score-box {
            background: var(--secondary);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .quiz-box {
            background: rgba(0, 210, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--secondary);
        }

        .fraction-area {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
        }

        .fraction-line {
            width: 60px;
            height: 3px;
            background: #fff;
            margin: 5px 0;
        }

        input {
            width: 60px;
            background: #0f172a;
            border: 1px solid var(--primary);
            color: #fff;
            font-size: 20px;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            outline: none;
        }

        /* Sağ Panel */
        .main {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1e293b, #0f172a);
        }

        .grid-line {
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 1;
        }

        .axis {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 2;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .mode-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #334155;
            font-size: 12px;
        }

        .label-val {
            font-size: 20px;
            font-weight: bold;
            fill: var(--primary);
        }

        #feedback {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            min-height: 40px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="header">
            <div style="font-size: 10px; color: var(--primary);">MATEMATİK ATÖLYESİ</div>
            <div style="font-size: 20px; font-weight: bold;">EĞİM LABORATUVARI</div>
        </div>

        <div class="score-box">⭐ BAŞARI PUANI: <span id="score">0</span></div>

        <div class="quiz-box">
            <strong style="color: var(--primary);">📖 Problem Senaryosu:</strong>
            <p id="question" style="font-size: 14px; line-height: 1.5; margin: 10px 0;">Yükleniyor...</p>
            <div style="display: flex; gap: 5px;">
                <button onclick="newQuestion()" style="flex: 1; font-size: 12px;">Yeni Soru</button>
                <button onclick="giveHint()" style="flex: 1; font-size: 12px; background: #64748b;">İpucu Ver</button>
            </div>
        </div>

        <div class="fraction-area">
            <div style="margin-bottom: 15px; font-size: 13px;">CEVABINI BURAYA GİR (m=y/x)</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span style="font-size: 24px;">m =</span>
                <div class="fraction">
                    <input type="number" id="inp-y" placeholder="y" oninput="draw()">
                    <div class="fraction-line"></div>
                    <input type="number" id="inp-x" placeholder="x" oninput="draw()">
                </div>
            </div>
        </div>

        <button onclick="check()" style="background: var(--success);">CEVABI KONTROL ET</button>
        <div id="feedback"></div>

        <div style="margin-top: auto; font-size: 11px; text-align: center; opacity: 0.5;">
            Öğr. Esra İbiş | Eğitim Teknolojileri Projesi
        </div>
    </div>

    <div class="main" id="canvas-area">
        <button class="mode-btn" onclick="toggleMode()">GÖRÜNÜMÜ DEĞİŞTİR (Izgara/Koordinat)</button>
        <svg viewBox="0 0 800 600" id="svg-main">
            <g id="grid-group"></g>
            <line id="axis-x" x1="50" y1="500" x2="750" y2="500" class="axis" />
            <line id="axis-y" x1="50" y1="50" x2="50" y2="500" class="axis" />

            <path id="tri" d="M 50 500 L 450 500 L 450 300 Z" fill="rgba(0, 210, 255, 0.1)" stroke="var(--primary)"
                stroke-width="4" />

            <text id="txt-y" x="470" y="400" class="label-val"></text>
            <text id="txt-x" x="250" y="530" class="label-val"></text>
            <rect id="rect-90" x="420" y="470" width="30" height="30" fill="none" stroke="#64748b" />
        </svg>
    </div>

    <script>
        let targetY, targetX, score = 0, isCoord = false;

        function initGrid() {
            const group = document.getElementById('grid-group');
            group.innerHTML = "";
            for (let i = 0; i <= 800; i += 40) {
                group.innerHTML += `<line x1="${i}" y1="0" x2="${i}" y2="600" class="grid-line" />`;
                group.innerHTML += `<line x1="0" y1="${i}" x2="800" y2="${i}" class="grid-line" />`;
            }
        }

        function newQuestion() {
            const qs = [
                { t: "Bir dağın dikey yüksekliği {y} metre, yatay genişliği {x} metredir.", y: [10, 15, 20], x: [20, 30, 40] },
                { t: "Bir koordinat doğrusu üzerinde dikeyde {y} birim, yatayda {x} birim ilerleyen bir yolun eğimi nedir?", y: [6, 8, 12], x: [8, 10, 16] }
            ];
            const q = qs[Math.floor(Math.random() * qs.length)];
            targetY = q.y[Math.floor(Math.random() * q.y.length)];
            targetX = q.x[Math.floor(Math.random() * q.x.length)];
            document.getElementById('question').innerText = q.t.replace('{y}', targetY).replace('{x}', targetX);
            document.getElementById('feedback').innerText = "";
            document.getElementById('inp-y').value = "";
            document.getElementById('inp-x').value = "";
            draw();
        }

        function draw() {
            const y = document.getElementById('inp-y').value || 0;
            const x = document.getElementById('inp-x').value || 0;
            const sX = 50, sY = 500;
            const scale = Math.min(650 / Math.max(x, 1), 400 / Math.max(y, 1), 30);
            const eX = sX + (x * scale);
            const eY = sY - (y * scale);

            document.getElementById('tri').setAttribute('d', `M ${sX} ${sY} L ${eX} ${sY} L ${eX} ${eY} Z`);
            document.getElementById('txt-y').textContent = y > 0 ? y : "";
            document.getElementById('txt-y').setAttribute('x', eX + 10);
            document.getElementById('txt-y').setAttribute('y', (sY + eY) / 2);
            document.getElementById('txt-x').textContent = x > 0 ? x : "";
            document.getElementById('txt-x').setAttribute('x', (sX + eX) / 2);
            document.getElementById('rect-90').setAttribute('x', eX - 30);
        }

        function check() {
            const y = parseInt(document.getElementById('inp-y').value);
            const x = parseInt(document.getElementById('inp-x').value);
            const fb = document.getElementById('feedback');

            if (y === targetY && x === targetX) {
                score += 10;
                document.getElementById('score').innerText = score;
                fb.innerHTML = "<span style='color:var(--success)'>HARİKA! Doğru cevap. 🥳</span>";
            } else if (y / x === targetY / targetX) {
                fb.innerHTML = "<span style='color:var(--warning)'>Eğim doğru ama sadeleştirmeden yazmışsın! 🤔</span>";
            } else {
                fb.innerHTML = "<span style='color:#ef4444'>Yanlış cevap. Dikey/Yatay oranını tekrar düşün! ❌</span>";
            }
        }

        function giveHint() {
            document.getElementById('feedback').innerText = "İpucu: Dikey kenar (y) her zaman pay kısmına yazılır.";
            document.getElementById('tri').style.strokeWidth = "8";
            setTimeout(() => document.getElementById('tri').style.strokeWidth = "4", 1000);
        }

        function toggleMode() {
            isCoord = !isCoord;
            const axisX = document.getElementById('axis-x');
            const axisY = document.getElementById('axis-y');
            if (isCoord) {
                axisX.setAttribute('y1', 300); axisX.setAttribute('y2', 300);
                axisY.setAttribute('x1', 400); axisY.setAttribute('x2', 400);
                document.getElementById('feedback').innerText = "Koordinat Modu Aktif!";
            } else {
                axisX.setAttribute('y1', 500); axisX.setAttribute('y2', 500);
                axisY.setAttribute('x1', 50); axisY.setAttribute('x2', 50);
            }
            draw();
        }

        window.onload = () => { initGrid(); newQuestion(); };
    </script>
</body>

</html>
