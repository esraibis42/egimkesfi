<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğim Master Pro | Soru Modülü</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sol Panel */
        .sidebar {
            width: 350px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
        }

        .quiz-section {
            background: rgba(0, 210, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--primary);
        }

        .input-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--primary);
            color: white;
            font-size: 18px;
            outline: none;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
            transform: scale(1.02);
        }

        /* Sağ Panel */
        .main-content {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1e293b, #0f172a);
        }

        #grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .canvas-container {
            width: 80%;
            height: 60%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .bike {
            font-size: 40px;
            transition: 0.5s;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">📐 LGS EĞİM ATÖLYESİ</div>

        <div class="quiz-section">
            <strong style="color: var(--primary);">🎯 Günün Sorusu:</strong>
            <p id="question-text" style="font-size: 14px; margin: 10px 0;">Soru yükleniyor...</p>
            <button onclick="generateQuestion()">Yeni Soru Sor</button>
        </div>

        <div class="input-box">
            <label style="font-size: 12px;">DİKEY YÜKSEKLİK (y)</label>
            <input type="number" id="v-input" value="100" oninput="update()">
        </div>

        <div class="input-box">
            <label style="font-size: 12px;">YATAY UZUNLUK (x)</label>
            <input type="number" id="h-input" value="200" oninput="update()">
        </div>

        <div id="result-card"
            style="background: var(--secondary); padding: 15px; border-radius: 10px; text-align: center;">
            <div style="font-size: 12px;">HESAPLANAN EĞİM</div>
            <div id="m-val" style="font-size: 28px; font-weight: bold;">0.50</div>
            <div id="p-val">%50</div>
        </div>

        <button id="check-btn" onclick="checkAnswer()" style="background: #10b981;">Cevabı Kontrol Et</button>
    </div>

    <div class="main-content">
        <div id="grid"></div>
        <div id="feedback" class="badge">Keşfetmeye Hazır mısın?</div>

        <div class="canvas-container">
            <svg viewBox="0 0 800 400">
                <path id="tri" d="M 50 350 L 250 350 L 250 250 Z" fill="rgba(0, 210, 255, 0.1)" stroke="#00d2ff"
                    stroke-width="4" />
                <text id="bike" x="150" y="300" class="bike">🚴‍♀️</text>
            </svg>
        </div>
    </div>

    <script>
        let currentTargetSlope = 0;

        function generateQuestion() {
            const types = [
                { n: "Bir engelli rampasının", d: "dikey yüksekliği {y} m, yatay uzunluğu {x} m'dir. Eğimi kaçtır?" },
                { n: "Bir çatının", d: "yüksekliği {y} cm, genişliği {x} cm'dir. Bu çatının eğimi yüzde kaçtır?" },
                { n: "Bir merdivenin", d: "basamak yüksekliği {y} birim, genişliği {x} birimdir. Eğimi bulunuz." }
            ];
            const q = types[Math.floor(Math.random() * types.length)];
            const y = Math.floor(Math.random() * 80) + 20;
            const x = Math.floor(Math.random() * 100) + 50;
            currentTargetSlope = (y / x).toFixed(2);

            document.getElementById('question-text').innerText = q.d.replace('{y}', y).replace('{x}', x);
            document.getElementById('feedback').innerText = "Soruyu çöz ve değerleri gir!";
            document.getElementById('feedback').style.color = "white";
        }

        function update() {
            const v = parseFloat(document.getElementById('v-input').value) || 0;
            const h = parseFloat(document.getElementById('h-input').value) || 0;
            const m = v / h;

            const startX = 50, startY = 350;
            const endX = startX + Math.min(h * 2, 600);
            const endY = startY - Math.min(v * 2, 300);

            document.getElementById('tri').setAttribute('d', `M ${startX} ${startY} L ${endX} ${startY} L ${endX} ${endY} Z`);
            document.getElementById('m-val').innerText = m.toFixed(2);
            document.getElementById('p-val').innerText = "%" + (m * 100).toFixed(0);

            const rider = document.getElementById('bike');
            const midX = (startX + endX) / 2, midY = (startY + endY) / 2;
            rider.setAttribute('x', midX - 20); rider.setAttribute('y', midY - 10);
            const angle = Math.atan2(startY - endY, endX - startX) * (-180 / Math.PI);
            rider.setAttribute('transform', `rotate(${angle}, ${midX}, ${midY})`);
        }

        function checkAnswer() {
            const userSlope = (parseFloat(document.getElementById('v-input').value) / parseFloat(document.getElementById('h-input').value)).toFixed(2);
            const fb = document.getElementById('feedback');
            if (userSlope == currentTargetSlope) {
                fb.innerText = "MUHTEŞEM! Doğru cevap! 🎉";
                fb.style.color = "#10b981";
            } else {
                fb.innerText = "Hmm, değerleri tekrar kontrol et. 🧐";
                fb.style.color = "#ef4444";
            }
        }

        window.onload = () => { generateQuestion(); update(); };
    </script>
</body>

</html>
