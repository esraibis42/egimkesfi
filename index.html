<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğim Master Pro | Rasyonel Modül</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .quiz-section {
            background: rgba(58, 123, 213, 0.15);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--secondary);
        }

        .input-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--primary);
            color: white;
            font-size: 18px;
            outline: none;
            margin-top: 5px;
        }

        /* Kesir Çizgisi Tasarımı */
        .fraction-container {
            margin: 20px 0;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .fraction-container:hover {
            background: #2d3e5a;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .numerator {
            border-bottom: 2px solid var(--text);
            padding: 0 10px;
        }

        .denominator {
            padding: 0 10px;
        }

        .hidden-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.5s;
        }

        .hidden-overlay.reveal {
            transform: translateY(-100%);
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
        }

        .main-content {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .canvas-container {
            width: 70%;
            height: 60%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">📐 RASYONEL EĞİM ATÖLYESİ</div>

        <div class="quiz-section">
            <strong style="color: var(--primary);">🎯 Problem:</strong>
            <p id="question-text" style="font-size: 14px; line-height: 1.6;">Yükleniyor...</p>
            <button onclick="generateQuestion()">Yeni Soru Getir</button>
        </div>

        <div class="input-box">
            <label style="font-size: 12px; color: #94a3b8;">DİKEY UZUNLUK (y)</label>
            <input type="number" id="v-input" value="3" oninput="update()">
        </div>

        <div class="input-box">
            <label style="font-size: 12px; color: #94a3b8;">YATAY UZUNLUK (x)</label>
            <input type="number" id="h-input" value="4" oninput="update()">
        </div>

        <div class="fraction-container" onclick="revealAnswer()">
            <div id="overlay" class="hidden-overlay">Cevabı Görmek İçin Tıkla</div>
            <div style="font-size: 12px; margin-bottom: 10px; opacity: 0.7;">EĞİM (m) =</div>
            <div class="fraction">
                <div id="num-val" class="numerator">3</div>
                <div id="den-val" class="denominator">4</div>
            </div>
        </div>

        <div id="feedback-msg" style="text-align: center; font-weight: bold; font-size: 14px;"></div>
    </div>

    <div class="main-content">
        <div id="grid"></div>
        <div class="canvas-container">
            <svg viewBox="0 0 800 400">
                <path id="tri" d="M 50 350 L 450 350 L 450 50 Z" fill="rgba(0, 210, 255, 0.1)" stroke="#00d2ff"
                    stroke-width="4" />
                <text id="bike" x="250" y="200" style="font-size: 40px; transition: 0.5s;">🚴‍♀️</text>
            </svg>
        </div>
    </div>

    <script>
        let currentY = 3, currentX = 4;

        function generateQuestion() {
            const questions = [
                { t: "Bir merdivenin basamağı {y} birim yüksekliğinde ve {x} birim genişliğindedir.", y: [3, 5, 8, 10], x: [4, 12, 15, 20] },
                { t: "Bir dik üçgenin dikey kenarı {y} cm, yatay kenarı {x} cm'dir.", y: [7, 9, 11, 15], x: [24, 40, 60, 30] }
            ];
            const q = questions[Math.floor(Math.random() * questions.length)];
            currentY = q.y[Math.floor(Math.random() * q.y.length)];
            currentX = q.x[Math.floor(Math.random() * q.x.length)];

            document.getElementById('question-text').innerText = q.t.replace('{y}', currentY).replace('{x}', currentX);
            document.getElementById('overlay').classList.remove('reveal');
            document.getElementById('feedback-msg').innerText = "";
        }

        function revealAnswer() {
            document.getElementById('overlay').classList.add('reveal');
            checkResult();
        }

        function update() {
            const v = parseFloat(document.getElementById('v-input').value) || 1;
            const h = parseFloat(document.getElementById('h-input').value) || 1;

            // Kesir güncelleme
            document.getElementById('num-val').innerText = v;
            document.getElementById('den-val').innerText = h;

            // Görsel güncelleme
            const startX = 50, startY = 350;
            const scale = Math.min(300 / v, 600 / h, 20); // Ölçeklendirme
            const endX = startX + (h * scale);
            const endY = startY - (v * scale);

            document.getElementById('tri').setAttribute('d', `M ${startX} ${startY} L ${endX} ${startY} L ${endX} ${endY} Z`);

            const rider = document.getElementById('bike');
            const midX = (startX + endX) / 2, midY = (startY + endY) / 2;
            rider.setAttribute('x', midX - 20); rider.setAttribute('y', midY - 10);
            const angle = Math.atan2(startY - endY, endX - startX) * (-180 / Math.PI);
            rider.setAttribute('transform', `rotate(${angle}, ${midX}, ${midY})`);
        }

        function checkResult() {
            const v = document.getElementById('v-input').value;
            const h = document.getElementById('h-input').value;
            const msg = document.getElementById('feedback-msg');

            if (v == currentY && h == currentX) {
                msg.innerText = "TEBRİKLER! Tam isabet. 🎯";
                msg.style.color = "#10b981";
            } else {
                msg.innerText = "Değerler sorudakinden farklı görünüyor. 🤔";
                msg.style.color = "#f59e0b";
            }
        }

        window.onload = () => { generateQuestion(); update(); };
    </script>
</body>

</html>
