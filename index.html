<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eğim Keşfi</title>

    <style>
        /* ---------- ARKA PLAN (MATEMATİK DEFTERİ) ---------- */

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background-color: #f8fbff;
            background-image:
                linear-gradient(#dfe8ff 1px, transparent 1px),
                linear-gradient(90deg, #dfe8ff 1px, transparent 1px);
            background-size: 40px 40px;
            color: #333;
        }

        /* ---------- HEADER ---------- */

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #5ec6ff, #4ed19b);
            color: white;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        /* ---------- ANA KUTU ---------- */

        .container {
            max-width: 900px;
            margin: auto;
            padding: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        /* ---------- SLIDER ---------- */

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .control {
            flex: 1;
            min-width: 200px;
        }

        input[type=range] {
            width: 100%;
        }

        .value {
            font-weight: bold;
            color: #1e88e5;
        }

        /* ---------- SVG ---------- */

        svg {
            width: 100%;
            max-width: 520px;
            display: block;
            margin: 30px auto;
        }

        /* ---------- MESAJ ---------- */

        .message {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2e7d32;
            margin-top: 10px;
        }

        /* ---------- MOBİL ---------- */

        @media(max-width:600px) {
            header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Eğim Keşif Simülasyonu</h1>
        <p>Dikey ve yatay uzunlukları değiştirerek eğimi keşfet</p>
    </header>


    <div class="container">

        <div class="card">

            <h2>Dik Üçgen Modeli</h2>

            <div class="controls">

                <div class="control">
                    <label>Dikey Uzunluk (Yükseklik)</label><br>
                    <input type="range" min="1" max="10" value="4" id="vertical">
                    <span class="value" id="vValue">4</span>
                </div>

                <div class="control">
                    <label>Yatay Uzunluk (Taban)</label><br>
                    <input type="range" min="1" max="10" value="6" id="horizontal">
                    <span class="value" id="hValue">6</span>
                </div>

            </div>

            <h3 style="text-align:center">
                Eğim = <span id="slope">0.67</span>
            </h3>

            <!-- SVG ALANI -->

            <svg viewBox="0 0 420 300">

                <polygon id="triangle" points="50,250 250,250 250,150" fill="#b3e5fc" stroke="#0288d1"
                    stroke-width="3" />

                <text id="baseLabel" x="150" y="270">x</text>
                <text id="heightLabel" x="260" y="200">y</text>

                <!-- bisikletli -->

                <text id="biker" font-size="26">🚴</text>

            </svg>

            <div class="message" id="slopeMessage">
                Hafif Yokuş 🚲
            </div>

        </div>

    </div>


    <script>

        const vSlider = document.getElementById("vertical")
        const hSlider = document.getElementById("horizontal")

        const vValue = document.getElementById("vValue")
        const hValue = document.getElementById("hValue")

        const slopeText = document.getElementById("slope")
        const triangle = document.getElementById("triangle")

        const baseLabel = document.getElementById("baseLabel")
        const heightLabel = document.getElementById("heightLabel")

        const biker = document.getElementById("biker")
        const message = document.getElementById("slopeMessage")

        function update() {

            let v = parseFloat(vSlider.value)
            let h = parseFloat(hSlider.value)

            vValue.textContent = v
            hValue.textContent = h

            let slope = v / h
            let slopePercent = Math.round(slope * 100)

            slopeText.textContent = slope.toFixed(2)

            /* ölçek */

            let scale = 18

            let x1 = 60
            let y1 = 250

            let x2 = x1 + h * scale
            let y2 = y1 - v * scale

            triangle.setAttribute(
                "points",
                `${x1},${y1} ${x2},${y1} ${x2},${y2}`
            )

            /* etiketler */

            baseLabel.setAttribute("x", (x1 + x2) / 2)
            baseLabel.setAttribute("y", y1 + 20)
            baseLabel.textContent = "x = " + h

            heightLabel.setAttribute("x", x2 + 8)
            heightLabel.setAttribute("y", (y1 + y2) / 2)
            heightLabel.textContent = "y = " + v

            /* hipotenüs orta noktası */

            let midX = (x1 + x2) / 2
            let midY = (y1 + y2) / 2

            biker.setAttribute("x", midX)
            biker.setAttribute("y", midY)

            /* bisiklet açısı */

            let angle = Math.atan(v / h) * (180 / Math.PI)

            biker.setAttribute(
                "transform",
                `rotate(${-angle} ${midX} ${midY})`
            )

            /* mesaj */

            if (slopePercent <= 20) {
                message.textContent = "Hafif Yokuş 🚲"
            }

            else if (slopePercent <= 50) {
                message.textContent = "Dikkat Dik Yokuş! 🚵‍♀️"
            }

            else {
                message.textContent = "Zirveye Tırmanış! 🧗‍♂️"
            }

        }

        vSlider.addEventListener("input", update)
        hSlider.addEventListener("input", update)

        update()

    </script>

</body>

</html>
