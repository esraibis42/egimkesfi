<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğim Master Pro | Sadeleştirme Modülü</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: rgba(30, 41, 59, 0.98);
            padding: 25px;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .score-box {
            background: var(--secondary);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .quiz-box {
            background: rgba(0, 210, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--secondary);
        }

        .fraction-area {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
        }

        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
        }

        .fraction-line {
            width: 60px;
            height: 3px;
            background: #fff;
            margin: 5px 0;
        }

        input {
            width: 70px;
            background: #0f172a;
            border: 1px solid var(--primary);
            color: #fff;
            font-size: 22px;
            text-align: center;
            padding: 5px;
            border-radius: 5px;
            outline: none;
        }

        .main {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1e293b, #0f172a);
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .label-val {
            font-size: 24px;
            font-weight: bold;
            fill: var(--primary);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div style="text-align: center; font-weight: bold; color: var(--primary);">📐 EĞİM ATÖLYESİ V4.0</div>
        <div class="score-box">⭐ PUAN: <span id="score">0</span></div>

        <div class="quiz-box">
            <strong style="color: var(--primary);">📖 Problem:</strong>
            <p id="question" style="font-size: 15px; line-height: 1.5; margin: 10px 0;">Yükleniyor...</p>
            <button onclick="newQuestion()">Yeni Soru Getir</button>
        </div>

        <div class="fraction-area">
            <div style="margin-bottom: 10px; font-size: 13px; color: #94a3b8;">EN SADE HALİYLE YAZ (m=y/x)</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span style="font-size: 28px;">m =</span>
                <div class="fraction">
                    <input type="number" id="inp-y" placeholder="y" oninput="draw()">
                    <div class="fraction-line"></div>
                    <input type="number" id="inp-x" placeholder="x" oninput="draw()">
                </div>
            </div>
        </div>

        <button onclick="check()" style="background: var(--success); font-size: 16px;">CEVABI KONTROL ET</button>
        <div id="feedback" style="text-align: center; margin-top: 15px; font-weight: bold; min-height: 40px;"></div>
    </div>

    <div class="main">
        <svg viewBox="0 0 800 600" id="svg-main" style="width: 85%; height: 85%;">
            <line x1="50" y1="500" x2="750" y2="500" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
            <line x1="50" y1="50" x2="50" y2="500" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
            <path id="tri" d="M 50 500 L 450 500 L 450 300 Z" fill="rgba(0, 210, 255, 0.1)" stroke="var(--primary)"
                stroke-width="5" />
            <text id="txt-y" x="470" y="400" class="label-val"></text>
            <text id="txt-x" x="250" y="540" class="label-val"></text>
        </svg>
    </div>

    <script>
        let targetY, targetX, score = 0;

        // EBOB Fonksiyonu (Sadeleştirme için)
        const getEBOB = (a, b) => b === 0 ? a : getEBOB(b, a % b);

        function newQuestion() {
            const qs = [
                { t: "Bir merdivenin dikey yüksekliği {y} birim, yatay uzunluğu {x} birimdir. Eğimi en sade haliyle yazınız.", y: [12, 6, 15, 20], x: [8, 4, 10, 25] },
                { t: "Bir rampanın yüksekliği {y} metre, genişliği {x} metredir. Eğimi rasyonel olarak belirtiniz.", y: [9, 4, 14, 18], x: [6, 12, 21, 12] }
            ];
            const q = qs[Math.floor(Math.random() * qs.length)];
            targetY = q.y[Math.floor(Math.random() * q.y.length)];
            targetX = q.x[Math.floor(Math.random() * q.x.length)];
            document.getElementById('question').innerText = q.t.replace('{y}', targetY).replace('{x}', targetX);
            document.getElementById('feedback').innerText = "";
            document.getElementById('inp-y').value = "";
            document.getElementById('inp-x').value = "";
            draw();
        }

        function draw() {
            const y = document.getElementById('inp-y').value || 0;
            const x = document.getElementById('inp-x').value || 0;
            const sX = 50, sY = 500;
            const scale = Math.min(600 / Math.max(x, 1), 400 / Math.max(y, 1), 30);
            const eX = sX + (x * scale);
            const eY = sY - (y * scale);
            document.getElementById('tri').setAttribute('d', `M ${sX} ${sY} L ${eX} ${sY} L ${eX} ${eY} Z`);
            document.getElementById('txt-y').textContent = y > 0 ? y : "";
            document.getElementById('txt-y').setAttribute('x', eX + 10);
            document.getElementById('txt-y').setAttribute('y', (sY + eY) / 2);
            document.getElementById('txt-x').textContent = x > 0 ? x : "";
            document.getElementById('txt-x').setAttribute('x', (sX + eX) / 2);
        }

        function check() {
            const y = parseInt(document.getElementById('inp-y').value);
            const x = parseInt(document.getElementById('inp-x').value);
            const fb = document.getElementById('feedback');

            if (!y || !x) { fb.innerHTML = "Lütfen değerleri gir! 🧐"; return; }

            const ortakBolen = getEBOB(targetY, targetX);
            const sadeY = targetY / ortakBolen;
            const sadeX = targetX / ortakBolen;

            if (y === sadeY && x === sadeX) {
                score += 10;
                document.getElementById('score').innerText = score;
                fb.innerHTML = "<span style='color:var(--success)'>MÜKEMMEL! En sade hali ( " + sadeY + "/" + sadeX + " ) doğru. 🎯</span>";
            } else if (y / x === targetY / targetX) {
                fb.innerHTML = "<span style='color:var(--warning)'>Oran doğru ama EN SADE halini yazmalısın! 🔍</span>";
            } else {
                fb.innerHTML = "<span style='color:#ef4444'>Hatalı sonuç. Dikey/Yatay oranını tekrar düşün! ❌</span>";
            }
        }

        window.onload = newQuestion;
    </script>
</body>

</html>
